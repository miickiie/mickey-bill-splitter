name: Deploy to GitHub Pages

on:
  # ทำงานอัตโนมัติเมื่อมีการ push โค้ดไปยังกิ่ง main
  push:
    branches: ["main", "master"]
  # อนุญาตให้กดสั่งรันได้เองจากหน้าเว็บ GitHub
  workflow_dispatch:

# สิทธิ์สำหรับ GITHUB_TOKEN เพื่อให้สามารถอัปโหลดไปยัง GitHub Pages ได้
permissions:
  contents: read
  pages: write
  id-token: write

# ป้องกันไม่ให้ทำงานซ้ำซ้อนกันหลายรอบ
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
